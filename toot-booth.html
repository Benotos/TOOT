<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE TOOT BOOTH | $TOOT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- BRAND VARIABLES --- */
        :root {
            --mint: #8be8b6; --green: #14F195; --purple: #9945FF;
            --yellow: #FFEB3B; --pink: #FF007A; --black: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito', sans-serif; overflow-x: hidden;
            background-color: var(--black); color: white; position: relative;
        }

        /* --- HYPNOTIC BACKGROUND --- */
        .hypnotic-bg {
            position: fixed; top: -50vh; left: -50vw; width: 200vw; height: 200vh;
            background: repeating-conic-gradient(from 0deg, var(--mint) 0deg 15deg, var(--green) 15deg 30deg);
            animation: spinBg 40s linear infinite; z-index: -3;
        }
        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.9) 80%);
            z-index: -2;
        }

        /* --- FLOATING EMOJIS (Cameras & Sparkles) --- */
        .floating-emoji {
            position: fixed; bottom: -100px; font-size: 3.5rem;
            animation: floatUp 6s infinite ease-in; opacity: 0; z-index: -1;
            filter: drop-shadow(4px 4px 0px #000);
        }
        @keyframes floatUp { 
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; } 
            20% { opacity: 1; } 
            100% { transform: translateY(-120vh) scale(2.5) rotate(-45deg); opacity: 0; } 
        }

        /* --- HEADER (EXACT MATCH) --- */
        header {
            position: relative; z-index: 100; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--black); border-bottom: 5px solid var(--mint);
        }
        .logo {
            font-family: 'Bangers', cursive; font-size: clamp(2.5rem, 5vw, 4rem);
            color: var(--yellow); text-decoration: none; -webkit-text-stroke: 2px var(--black); 
            text-shadow: 4px 4px 0px var(--purple); transform: rotate(-3deg); transition: 0.2s;
        }
        .logo:hover { transform: rotate(3deg) scale(1.1); }
        
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a {
            color: white; text-decoration: none; font-family: 'Bangers', cursive;
            font-size: 1.5rem; letter-spacing: 2px; -webkit-text-stroke: 1px var(--black); transition: 0.2s;
        }
        /* Active Link is now TOOT BOOTH */
        .nav-links a.active { color: var(--pink); text-shadow: 3px 3px 0px var(--black); transform: translateY(-3px); }
        .nav-links a:hover { color: var(--yellow); text-shadow: 3px 3px 0px var(--black); transform: translateY(-3px); }

        .btn-brutal {
            background: var(--pink); color: white; font-family: 'Bangers', cursive; font-size: clamp(1.2rem, 3vw, 1.8rem); 
            letter-spacing: 2px; padding: 10px 20px; border: 4px solid var(--black); border-radius: 50px;
            box-shadow: 6px 6px 0px var(--black); cursor: pointer; transition: 0.1s; transform: rotate(2deg); white-space: nowrap;
        }
        .btn-brutal:active { box-shadow: 0 0 0 var(--black); transform: translate(6px, 6px) rotate(0deg); }
        .menu-toggle { display: none; background: none; border: none; font-size: 2.5rem; color: var(--mint); cursor: pointer; text-shadow: 3px 3px 0px var(--black); }

        /* --- BOOTH CONTENT --- */
        .booth-section {
            position: relative; z-index: 10; padding: 60px 5% 100px;
            max-width: 900px; margin: 0 auto; text-align: center;
        }
        .page-title {
            font-family: 'Bangers', cursive; font-size: clamp(4rem, 10vw, 8rem);
            color: white; -webkit-text-stroke: 3px var(--black);
            text-shadow: 8px 8px 0px var(--mint), 16px 16px 0px var(--black);
            margin-bottom: 10px; transform: rotate(2deg);
        }
        .page-subtitle {
            font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 900; background: var(--black); color: var(--pink);
            padding: 15px 30px; border: 4px solid var(--pink); border-radius: 20px; 
            box-shadow: 8px 8px 0px var(--pink); display: inline-block; margin-bottom: 60px; transform: rotate(-2deg);
        }

        /* The Meme Generator UI */
        .generator-card {
            background: white; padding: 40px 20px;
            border: 8px dashed var(--black); border-radius: 30px;
            box-shadow: 15px 15px 0px var(--purple); transform: rotate(-1deg);
        }
        
        .upload-label {
            display: inline-block; background: var(--yellow); color: var(--black);
            font-family: 'Bangers', cursive; font-size: clamp(2rem, 5vw, 3rem);
            padding: 20px 40px; border: 6px solid var(--black); border-radius: 50px;
            box-shadow: 8px 8px 0px var(--black); cursor: pointer; transition: 0.2s;
            margin-bottom: 20px;
        }
        .upload-label:hover { background: var(--mint); transform: translateY(-5px) rotate(2deg); }
        .upload-label:active { box-shadow: 0 0 0 var(--black); transform: translate(8px, 8px); }

        /* The Canvas where the image renders */
        #memeCanvas {
            max-width: 100%; height: auto; border: 6px solid var(--black);
            border-radius: 20px; display: none; margin: 20px auto;
            box-shadow: 10px 10px 0px var(--black);
        }

        .btn-download {
            display: none; background: var(--pink); color: white;
            font-family: 'Bangers', cursive; font-size: clamp(2rem, 5vw, 3rem);
            padding: 20px 40px; border: 6px solid var(--black); border-radius: 50px;
            box-shadow: 8px 8px 0px var(--black); cursor: pointer; transition: 0.2s;
            margin: 20px auto 0; width: 100%; max-width: 400px;
        }
        .btn-download:hover { background: var(--yellow); color: var(--black); transform: translateY(-5px); }
        .btn-download:active { box-shadow: 0 0 0 var(--black); transform: translate(8px, 8px); }

        /* --- FOOTER --- */
        footer { background: var(--black); border-top: 5px solid var(--pink); padding: 40px 5%; text-align: center; position: relative; z-index: 10; margin-top: 80px; }

        @media (max-width: 900px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--black); border-bottom: 5px solid var(--mint); padding: 20px 0; }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
            .btn-brutal { display: none; }
            .generator-card { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <div class="hypnotic-bg"></div>
    <div class="bg-overlay"></div>

    <div class="floating-emoji" style="left: 10%; animation-delay: 0s;">📸</div>
    <div class="floating-emoji" style="left: 50%; animation-delay: 2.5s;">✨</div>
    <div class="floating-emoji" style="left: 80%; animation-delay: 1s;">🎨</div>

    <header>
        <a href="index.html" class="logo">$TOOT</a>
        <button class="menu-toggle" id="menuToggleBtn">☰</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">HOME</a>
            <a href="tokenomics.html">TOKENOMICS</a>
            <a href="how-to-buy.html">HOW TO BUY</a>
            <a href="toot-booth.html" class="active">TOOT BOOTH</a>
        </nav>
        <button class="btn-brutal">CONNECT WALLET</button>
    </header>

    <main class="booth-section">
        <h1 class="page-title">THE TOOT<br>BOOTH</h1>
        <p class="page-subtitle">UPLOAD. STAMP. RAID THE TIMELINE.</p>

        <div class="generator-card">
            
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
            <label for="imageUpload" class="upload-label" id="uploadBtnText">CHOOSE AN IMAGE</label>

            <canvas id="memeCanvas"></canvas>

            <button class="btn-download" id="downloadMemeBtn">DOWNLOAD MEME</button>
        </div>
    </main>

    <footer>
        <h2 class="logo" style="font-size: 3rem; margin-bottom: 10px;">$TOOT</h2>
        <p style="font-size: 1.2rem; font-weight: bold; opacity: 0.8;">The Only Obvious Trade.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Mobile Menu
            const menuToggleBtn = document.getElementById('menuToggleBtn');
            const navLinks = document.getElementById('navLinks');
            menuToggleBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                menuToggleBtn.innerText = navLinks.classList.contains('active') ? '✕' : '☰';
            });

            // --- MEME GENERATOR LOGIC ---
            const imageUpload = document.getElementById('imageUpload');
            const canvas = document.getElementById('memeCanvas');
            const ctx = canvas.getContext('2d');
            const downloadBtn = document.getElementById('downloadMemeBtn');
            const uploadBtnText = document.getElementById('uploadBtnText');
            
            // Pre-load the mascot stamp (ensure the name is exactly mascot.jpg or mascot.png)
            const mascotStamp = new Image();
            // We use mascot.jpg based on your earlier configuration
            mascotStamp.src = 'mascot.jpg'; 

            imageUpload.addEventListener('change', (event) => {
                if(event.target.files.length === 0) return;

                const reader = new FileReader();
                uploadBtnText.innerText = 'LOADING...';

                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        // Set canvas size to the uploaded image's actual dimensions
                        canvas.width = img.width;
                        canvas.height = img.height;
                        
                        // Draw the base image
                        ctx.drawImage(img, 0, 0);

                        // Calculate stamp size (35% of the image width)
                        const stampWidth = img.width * 0.35;
                        const stampHeight = (mascotStamp.height / mascotStamp.width) * stampWidth;
                        
                        // Position in bottom right with padding
                        const padding = img.width * 0.05; // 5% padding
                        const xPos = canvas.width - stampWidth - padding;
                        const yPos = canvas.height - stampHeight - padding;

                        // Draw the mascot stamp!
                        ctx.drawImage(mascotStamp, xPos, yPos, stampWidth, stampHeight);

                        // Reveal canvas and download button
                        canvas.style.display = 'block';
                        downloadBtn.style.display = 'inline-block';
                        uploadBtnText.innerText = 'CHOOSE DIFFERENT IMAGE';
                        uploadBtnText.style.fontSize = 'clamp(1.5rem, 3vw, 2rem)'; // Make text smaller after first use
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(event.target.files[0]);
            });

            // Download Logic
            downloadBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = 'TOOT_RAID.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
